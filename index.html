<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Férias | Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #0b1120;
  --ink2:       #16213a;
  --ink3:       #1e2e4a;
  --ink4:       #2a3f62;
  --surface:    #eef1f8;
  --card:       #ffffff;
  --border:     #dde3ef;
  --muted:      #5e718f;
  --muted2:     #8fa0bb;
  --accent:     #1d4ed8;
  --accent2:    #2563eb;
  --accent-lt:  #dbeafe;
  --green:      #15803d;
  --green-lt:   #dcfce7;
  --amber:      #92400e;
  --amber2:     #d97706;
  --amber-lt:   #fef3c7;
  --red:        #b91c1c;
  --red-lt:     #fee2e2;
  --blue:       #0369a1;
  --blue-lt:    #e0f2fe;
  --r:          12px;
  --rs:         7px;
  --sh:         0 1px 2px rgba(11,17,32,.04), 0 4px 20px rgba(11,17,32,.07);
  --sh2:        0 8px 40px rgba(11,17,32,.14);
  --sh3:        0 24px 80px rgba(11,17,32,.28);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--surface);
  color: var(--ink);
  min-height: 100vh;
  letter-spacing: -.01em;
}

/* ══ TOPBAR ══════════════════════════════ */
.topbar {
  background: var(--ink);
  height: 60px;
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 300;
  box-shadow: 0 1px 0 rgba(255,255,255,.05), 0 4px 24px rgba(0,0,0,.3);
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  box-shadow: 0 2px 10px rgba(37,99,235,.45);
}
.brand-sep { width: 1px; height: 26px; background: rgba(255,255,255,.1); }
.brand-info { line-height: 1.25; }
.brand-name {
  font-size: 12px; font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #fff;
}
.brand-sub { font-size: 10.5px; color: rgba(255,255,255,.32); letter-spacing: .04em; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.top-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: rgba(255,255,255,.35);
  background: rgba(255,255,255,.06);
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,.08);
  letter-spacing: .04em;
}
#btnRefresh {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.5);
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: .2s;
  letter-spacing: .02em;
}
#btnRefresh:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.spin { display: inline-block; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ SUMÁRIO ═════════════════════════════ */
.summary-wrap {
  padding: 28px 40px 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.sum-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
  box-shadow: var(--sh);
  display: flex; align-items: center; gap: 14px;
  transition: .2s;
}
.sum-card:hover { transform: translateY(-3px); box-shadow: var(--sh2); }
.sum-ico { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sum-val   { font-size: 28px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.sum-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; }

/* ══ FILTROS ═════════════════════════════ */
.filters-wrap {
  padding: 22px 40px 8px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.fg input, .fg select {
  height: 38px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 0 13px;
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  color: var(--ink);
  outline: none;
  transition: .18s;
  font-weight: 500;
}
.fg input  { min-width: 250px; }
.fg select { min-width: 148px; }
.fg input:focus, .fg select:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
#btnClear {
  height: 38px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 0 16px;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: .2s;
  align-self: flex-end;
  letter-spacing: .02em;
}
#btnClear:hover { border-color: var(--red); color: var(--red); }
.result-count {
  align-self: flex-end;
  margin-left: auto;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .02em;
}

/* ══ GRID ════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
  padding: 20px 40px 60px;
}

/* ══ CARD ════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: .22s ease;
  animation: up .32s ease both;
  cursor: pointer;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--sh2);
  border-color: #b8cbf5;
}
@keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* Header do card */
.ch {
  height: 120px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ch-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--ink2) 0%, var(--ink3) 60%, var(--ink4) 100%);
}
.ch-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 75% 40%, rgba(37,99,235,.3) 0%, transparent 65%);
}
/* linha decorativa sutil */
.ch-bg::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
}

.avatar-wrap { position: relative; z-index: 2; }
.avatar {
  width: 82px; height: 82px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.2);
  background: var(--ink3);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  color: rgba(255,255,255,.3);
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.btn-photo {
  position: absolute; bottom: 1px; right: 1px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--accent2);
  border: 2.5px solid var(--card);
  color: #fff;
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
  z-index: 3;
}
.btn-photo:hover { transform: scale(1.18); background: var(--accent); }
.btn-photo.saving { background: var(--amber2); animation: spin .8s linear infinite; pointer-events: none; }

.tag-local {
  position: absolute; top: 10px; left: 10px; z-index: 3;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.9);
  font-size: 9px; font-weight: 700;
  letter-spacing: .1em;
  padding: 3px 9px;
  border-radius: 4px;
  text-transform: uppercase;
}
.tag-status { position: absolute; top: 10px; right: 10px; z-index: 3; }

/* Body */
.cb {
  padding: 18px 18px 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.cb-identity { display: flex; flex-direction: column; gap: 5px; }

.cb-name {
  font-size: 13.5px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -.01em;
}
.cb-role-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cb-role-line {
  width: 18px; height: 2px;
  background: var(--accent2);
  border-radius: 2px;
  flex-shrink: 0;
}
.cb-role {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: .01em;
  text-transform: uppercase;
}

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.ii { background: var(--surface); border-radius: 7px; padding: 8px 10px; }
.ii.full { grid-column: 1/-1; }
.ii-label {
  font-size: 9px; font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 3px;
}
.ii-val {
  font-size: 12px; font-weight: 600;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -.02em;
}
.ii-val.accent { color: var(--accent2); }
.ii-val.green  { color: var(--green); }
.ii-val.red    { color: var(--red); }
.ii-val.amber  { color: var(--amber2); }

/* Footer */
.cf {
  padding: 10px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
  border-top: 1px solid var(--border);
}
.cf-adm {
  font-size: 10.5px;
  color: var(--muted2);
  font-weight: 500;
  letter-spacing: .02em;
}
.cf-dias {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: .01em;
}

/* ══ BADGES ══════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 9.5px; font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .8; }
.b-concluido { background: var(--green-lt); color: var(--green); }
.b-ferias    { background: var(--blue-lt);  color: var(--blue); }
.b-agendado  { background: var(--amber-lt); color: var(--amber); }
.b-ativo     { background: var(--accent-lt);color: var(--accent); }
.b-desligado { background: #f1f5f9;         color: #94a3b8; }
.b-vencer    { background: var(--red-lt);   color: var(--red); }
.b-undefined { background: #f1f5f9;         color: #94a3b8; }

/* ══ MODAL ═══════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(11,17,32,.65);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--card);
  border-radius: 16px;
  width: 100%;
  max-width: 520px;
  box-shadow: var(--sh3);
  border: 1px solid var(--border);
  overflow: hidden;
  transform: scale(.96) translateY(12px);
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal {
  transform: scale(1) translateY(0);
}

.modal-header {
  height: 140px;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 0 28px 20px;
  background: linear-gradient(135deg, var(--ink2) 0%, var(--ink3) 60%, var(--ink4) 100%);
  gap: 18px;
  overflow: hidden;
}
.modal-header::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 30%, rgba(37,99,235,.35) 0%, transparent 60%);
  pointer-events: none;
}
.modal-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,.25);
  background: var(--ink3);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  color: rgba(255,255,255,.3);
  overflow: hidden;
  flex-shrink: 0;
  position: relative; z-index: 1;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.modal-identity { position: relative; z-index: 1; }
.modal-name {
  font-size: 15px; font-weight: 700;
  color: #fff;
  line-height: 1.25;
  letter-spacing: -.01em;
}
.modal-role {
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,.55);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.modal-close {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.7);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
}
.modal-close:hover { background: rgba(255,255,255,.2); color: #fff; }

.modal-body { padding: 24px 28px 28px; display: flex; flex-direction: column; gap: 20px; }

.modal-section-title {
  font-size: 9.5px; font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: .12em;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-grid.three { grid-template-columns: 1fr 1fr 1fr; }

.mf { background: var(--surface); border-radius: 8px; padding: 10px 12px; }
.mf.full { grid-column: 1/-1; }
.mf-label {
  font-size: 9px; font-weight: 700;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 3px;
}
.mf-val {
  font-size: 12.5px; font-weight: 600;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
}
.mf-val.accent { color: var(--accent2); }
.mf-val.green  { color: var(--green); }
.mf-val.red    { color: var(--red); }
.mf-val.amber  { color: var(--amber2); }

.modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  padding-top: 4px;
}

/* ══ TOAST ════════════════════════════════ */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 9999;
  background: var(--ink); color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 12.5px; font-weight: 600;
  letter-spacing: .01em;
  box-shadow: var(--sh2);
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transform: translateY(12px);
  transition: .3s ease;
  pointer-events: none; max-width: 320px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { border-left: 4px solid var(--green); }
.toast.err { border-left: 4px solid var(--red); }

/* ══ LOADING ══════════════════════════════ */
.state-box {
  grid-column: 1/-1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 80px 20px;
  color: var(--muted); font-size: 14px;
}
.loader {
  width: 38px; height: 38px;
  border: 3px solid var(--border);
  border-top-color: var(--accent2);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@media (max-width: 640px) {
  .topbar, .summary-wrap, .filters-wrap, .grid { padding-left: 16px; padding-right: 16px; }
  .fg input { min-width: 100%; }
  .modal { max-width: 100%; }
  .modal-grid { grid-template-columns: 1fr 1fr; }
  .modal-grid.three { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🏖️</div>
    <div class="brand-sep"></div>
    <div class="brand-info">
      <div class="brand-name">Dashboard de Férias</div>
      <div class="brand-sub">Engenharia · 2025 – 2027</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="top-date" id="topDate"></div>
    <button id="btnRefresh" onclick="loadData()"><span id="refreshIcon">↻</span> Atualizar</button>
  </div>
</div>

<!-- SUMÁRIO -->
<div class="summary-wrap" id="summary"></div>

<!-- FILTROS -->
<div class="filters-wrap">
  <div class="fg"><span class="fg-label">Buscar</span><input type="text" id="fSearch" placeholder="Nome, função, equipe..."></div>
  <div class="fg"><span class="fg-label">Local</span><select id="fLocal"><option value="">Todos</option></select></div>
  <div class="fg"><span class="fg-label">Setor</span><select id="fSetor"><option value="">Todos</option></select></div>
  <div class="fg"><span class="fg-label">Equipe</span><select id="fEquipe"><option value="">Todas</option></select></div>
  <div class="fg"><span class="fg-label">Função</span><select id="fFuncao"><option value="">Todas</option></select></div>
  <div class="fg"><span class="fg-label">Status</span><select id="fStatus"><option value="">Todos</option></select></div>
  <button id="btnClear" onclick="clearFilters()">✕ Limpar</button>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- GRID -->
<div class="grid" id="mainGrid">
  <div class="state-box"><div class="loader"></div><span>Carregando dados...</span></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="mHeader">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-avatar" id="mAvatar"></div>
      <div class="modal-identity">
        <div class="modal-name" id="mName"></div>
        <div class="modal-role" id="mRole"></div>
        <div id="mBadge" style="margin-top:8px"></div>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2zKdO0mATdM0vTBxNd037wXVbCkwtimVq7MEj8oWI1d7JYb27koKRe_-vgAvai4k/exec";

let allData = [];

document.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 60000);
  loadData();
  ['fSearch','fLocal','fSetor','fEquipe','fFuncao','fStatus'].forEach(id => {
    document.getElementById(id).addEventListener('input', renderCards);
    document.getElementById(id).addEventListener('change', renderCards);
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
});

function updateClock() {
  document.getElementById('topDate').textContent =
    new Date().toLocaleDateString('pt-BR', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
}

/* ── LOAD ── */
async function loadData() {
  const icon = document.getElementById('refreshIcon');
  icon.className = 'spin';
  document.getElementById('mainGrid').innerHTML =
    '<div class="state-box"><div class="loader"></div><span>Carregando dados...</span></div>';
  try {
    const res  = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Erro desconhecido');
    allData = json.data;
    populateFilters();
    renderCards();
  } catch(e) {
    document.getElementById('mainGrid').innerHTML =
      `<div class="state-box">
        <span style="font-size:32px">⚠️</span>
        <strong>Erro ao carregar dados</strong>
        <span style="font-size:12px;max-width:400px;text-align:center">${e.message}</span>
        <button onclick="loadData()" style="margin-top:8px;padding:8px 20px;background:var(--accent2);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:Outfit,sans-serif">Tentar novamente</button>
      </div>`;
  } finally {
    icon.className = '';
  }
}

/* ── FOTO ── */
async function savePhoto(rowIndex, base64, btnEl) {
  btnEl.className = 'btn-photo saving';
  btnEl.textContent = '↻';
  try {
    const url = `${APPS_SCRIPT_URL}?action=savePhoto&rowIndex=${rowIndex}&foto=${encodeURIComponent(base64)}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    const item = allData.find(c => c.rowIndex === rowIndex);
    if (item) item.foto = base64;
    // Atualiza também o modal se estiver aberto
    const mAv = document.getElementById('mAvatar');
    if (mAv && mAv.dataset.ri == rowIndex) {
      mAv.innerHTML = `<img src="${base64}" alt="foto">`;
    }
    showToast('✓ Foto salva na planilha!', 'ok');
  } catch(e) {
    showToast('✗ Erro ao salvar: ' + e.message, 'err');
  } finally {
    btnEl.className = 'btn-photo';
    btnEl.textContent = '✎';
  }
}

function handlePhotoUpload(rowIndex, event, btnEl) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 180;
      const ratio = Math.min(MAX / img.width, MAX / img.height);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const base64 = canvas.toDataURL('image/jpeg', 0.65);
      const av = document.getElementById(`av-${rowIndex}`);
      if (av) av.innerHTML = `<img src="${base64}" alt="foto">`;
      savePhoto(rowIndex, base64, btnEl);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── STATUS ── */
function calcStatus(c) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  if (['DESLIGADO','INATIVO','DEMITIDO'].includes((c.status||'').toUpperCase())) return 'DESLIGADO';
  const ini = parseDate(c.inicioFerias);
  const fim = parseDate(c.fimFerias);
  if (ini && fim) {
    if (hoje > fim) return 'CONCLUÍDA';
    if (hoje >= ini && hoje <= fim) return 'EM FÉRIAS';
    const lim = parseDate(c.limDobra);
    if (lim && lim >= hoje && Math.ceil((lim-hoje)/86400000) <= 30) return 'A VENCER';
    return 'AGENDADO';
  }
  if (ini && !fim) return 'AGENDADO';
  const s = (c.status||'').toUpperCase();
  if (s === 'FERIAS') return 'EM FÉRIAS';
  if (s === 'ATIVO')  return 'ATIVO';
  return s || 'ATIVO';
}

function parseDate(str) {
  if (!str || str === '—' || str === '---') return null;
  const p = str.split('/');
  if (p.length !== 3) return null;
  const d = new Date(+p[2], +p[1]-1, +p[0]);
  return isNaN(d) ? null : d;
}

/* ── FILTROS ── */
function populateFilters() {
  const sets = {fLocal:{}, fSetor:{}, fEquipe:{}, fFuncao:{}, fStatus:{}};
  allData.forEach(c => {
    if (c.local  && c.local  !== '—') sets.fLocal[c.local]   = 1;
    if (c.setor  && c.setor  !== '—') sets.fSetor[c.setor]   = 1;
    if (c.equipe && c.equipe !== '—') sets.fEquipe[c.equipe] = 1;
    if (c.funcao && c.funcao !== '—') sets.fFuncao[c.funcao] = 1;
    sets.fStatus[calcStatus(c)] = 1;
  });
  Object.entries(sets).forEach(([id, obj]) => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    while (sel.options.length > 1) sel.remove(1);
    Object.keys(obj).sort().forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v; sel.appendChild(o);
    });
    sel.value = cur;
  });
}

function clearFilters() {
  ['fSearch','fLocal','fSetor','fEquipe','fFuncao','fStatus'].forEach(id => {
    const el = document.getElementById(id);
    el.tagName === 'INPUT' ? el.value = '' : el.selectedIndex = 0;
  });
  renderCards();
}

/* ── RENDER ── */
function renderCards() {
  const search  = document.getElementById('fSearch').value.toLowerCase();
  const fLocal  = document.getElementById('fLocal').value;
  const fSetor  = document.getElementById('fSetor').value;
  const fEquipe = document.getElementById('fEquipe').value;
  const fFuncao = document.getElementById('fFuncao').value;
  const fStatus = document.getElementById('fStatus').value;

  const filtered = allData.filter(c => {
    const s = calcStatus(c);
    if (fLocal  && c.local  !== fLocal)  return false;
    if (fSetor  && c.setor  !== fSetor)  return false;
    if (fEquipe && c.equipe !== fEquipe) return false;
    if (fFuncao && c.funcao !== fFuncao) return false;
    if (fStatus && s !== fStatus)        return false;
    if (search) {
      const hay = `${c.nome} ${c.funcao} ${c.equipe} ${c.setor} ${c.local} ${c.turno}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('resultCount').textContent =
    `${filtered.length} colaborador${filtered.length !== 1 ? 'es' : ''}`;

  renderSummary(filtered);

  const grid = document.getElementById('mainGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="state-box"><span style="font-size:32px">🔍</span><strong>Nenhum resultado encontrado</strong></div>`;
    return;
  }
  grid.innerHTML = filtered.map((c, i) => cardHTML(c, i)).join('');
}

/* ── SUMÁRIO ── */
function renderSummary(data) {
  const ct = {total:data.length, ferias:0, agendado:0, concluido:0, vencer:0};
  data.forEach(c => {
    const s = calcStatus(c);
    if (s === 'EM FÉRIAS') ct.ferias++;
    if (s === 'AGENDADO')  ct.agendado++;
    if (s === 'CONCLUÍDA') ct.concluido++;
    if (s === 'A VENCER')  ct.vencer++;
  });
  document.getElementById('summary').innerHTML = `
    <div class="sum-card"><div class="sum-ico" style="background:#e0f2fe">👨‍💼</div><div><div class="sum-val">${ct.total}</div><div class="sum-label">Total</div></div></div>
    <div class="sum-card"><div class="sum-ico" style="background:var(--blue-lt)">🏖️</div><div><div class="sum-val" style="color:var(--blue)">${ct.ferias}</div><div class="sum-label">Em Férias</div></div></div>
    <div class="sum-card"><div class="sum-ico" style="background:var(--amber-lt)">📅</div><div><div class="sum-val" style="color:var(--amber2)">${ct.agendado}</div><div class="sum-label">Agendado</div></div></div>
    <div class="sum-card"><div class="sum-ico" style="background:var(--green-lt)">✅</div><div><div class="sum-val" style="color:var(--green)">${ct.concluido}</div><div class="sum-label">Concluídas</div></div></div>
    <div class="sum-card"><div class="sum-ico" style="background:var(--red-lt)">⚠️</div><div><div class="sum-val" style="color:var(--red)">${ct.vencer}</div><div class="sum-label">A Vencer</div></div></div>`;
}

/* ── CARD HTML ── */
function cardHTML(c, idx) {
  const status   = calcStatus(c);
  const hoje     = new Date(); hoje.setHours(0,0,0,0);
  const ini      = parseDate(c.inicioFerias);
  const fim      = parseDate(c.fimFerias);
  const lim      = parseDate(c.limDobra);
  const fotoSrc  = (c.foto && c.foto !== '—') ? c.foto : null;
  const ri       = c.rowIndex;

  let diasLabel = '';
  if (ini && ini > hoje) {
    const d = Math.ceil((ini-hoje)/86400000);
    diasLabel = `em ${d} dia${d!==1?'s':''}`;
  } else if (ini && fim && hoje>=ini && hoje<=fim) {
    const d = Math.ceil((fim-hoje)/86400000);
    diasLabel = `${d} dia${d!==1?'s':''} restante${d!==1?'s':''}`;
  }

  let limClass = '';
  if (lim) {
    const diff = Math.ceil((lim-hoje)/86400000);
    limClass = diff < 0 ? 'red' : diff <= 30 ? 'amber' : 'green';
  }
  const fimIni = fim && fim < hoje ? 'green' : ini && ini <= hoje ? 'accent' : '';

  return `
  <div class="card" style="animation-delay:${Math.min(idx*0.04,0.5)}s" onclick="openModal(${ri})">
    <div class="ch">
      <div class="ch-bg"></div>
      <span class="tag-local">${c.local}</span>
      <span class="tag-status">${badgeHTML(status)}</span>
      <div class="avatar-wrap">
        <div class="avatar" id="av-${ri}">${fotoSrc ? `<img src="${fotoSrc}" alt="foto">` : '👤'}</div>
        <label class="btn-photo" id="btnph-${ri}" title="Alterar foto" for="fph-${ri}" onclick="event.stopPropagation()">✎</label>
        <input type="file" id="fph-${ri}" accept="image/*" style="display:none"
          onchange="handlePhotoUpload(${ri},event,document.getElementById('btnph-${ri}'))">
      </div>
    </div>
    <div class="cb">
      <div class="cb-identity">
        <div class="cb-name">${c.nome}</div>
        <div class="cb-role-wrap">
          <div class="cb-role-line"></div>
          <div class="cb-role">${c.funcao !== '—' ? c.funcao : '—'}</div>
        </div>
      </div>
      <div class="info-grid">
        <div class="ii"><div class="ii-label">Equipe</div><div class="ii-val">${c.equipe}</div></div>
        <div class="ii"><div class="ii-label">Turno</div><div class="ii-val">${c.turno}</div></div>
        <div class="ii"><div class="ii-label">Início Férias</div><div class="ii-val ${fimIni}">${c.inicioFerias}</div></div>
        <div class="ii"><div class="ii-label">Final Férias</div><div class="ii-val ${fimIni}">${c.fimFerias}</div></div>
      </div>
    </div>
    <div class="cf">
      <span class="cf-adm">${c.admissao !== '—' ? 'Adm. ' + c.admissao : ''}</span>
      ${diasLabel ? `<span class="cf-dias">${diasLabel}</span>` : ''}
    </div>
  </div>`;
}

/* ── MODAL ── */
function openModal(rowIndex) {
  const c      = allData.find(x => x.rowIndex === rowIndex);
  if (!c) return;

  const status   = calcStatus(c);
  const hoje     = new Date(); hoje.setHours(0,0,0,0);
  const lim      = parseDate(c.limDobra);
  const fotoSrc  = (c.foto && c.foto !== '—') ? c.foto : null;

  let limClass = '';
  if (lim) {
    const diff = Math.ceil((lim-hoje)/86400000);
    limClass = diff < 0 ? 'red' : diff <= 30 ? 'amber' : 'green';
  }
  const ini    = parseDate(c.inicioFerias);
  const fim    = parseDate(c.fimFerias);
  const fimIni = fim && fim < hoje ? 'green' : ini && ini <= hoje ? 'accent' : '';

  // Header
  const mAv = document.getElementById('mAvatar');
  mAv.innerHTML = fotoSrc ? `<img src="${fotoSrc}" alt="foto">` : '👤';
  mAv.dataset.ri = rowIndex;

  document.getElementById('mName').textContent = c.nome;
  document.getElementById('mRole').textContent = c.funcao !== '—' ? c.funcao : '';
  document.getElementById('mBadge').innerHTML  = badgeHTML(status);

  // Body
  document.getElementById('mBody').innerHTML = `
    <div>
      <div class="modal-section-title">Identificação</div>
      <div class="modal-grid">
        <div class="mf"><div class="mf-label">Equipe</div><div class="mf-val">${c.equipe}</div></div>
        <div class="mf"><div class="mf-label">Setor</div><div class="mf-val">${c.setor}</div></div>
        <div class="mf"><div class="mf-label">Local</div><div class="mf-val">${c.local}</div></div>
        <div class="mf"><div class="mf-label">Turno</div><div class="mf-val">${c.turno}</div></div>
        <div class="mf"><div class="mf-label">Admissão</div><div class="mf-val">${c.admissao}</div></div>
        <div class="mf"><div class="mf-label">Centro de Custo</div><div class="mf-val">${c.centroCusto}</div></div>
      </div>
    </div>
    <div>
      <div class="modal-section-title">Período de Férias</div>
      <div class="modal-grid">
        <div class="mf full"><div class="mf-label">Período Aquisitivo</div><div class="mf-val accent">${c.perAquisitivo}</div></div>
        <div class="mf"><div class="mf-label">Início</div><div class="mf-val ${fimIni}">${c.inicioFerias}</div></div>
        <div class="mf"><div class="mf-label">Final</div><div class="mf-val ${fimIni}">${c.fimFerias}</div></div>
        <div class="mf"><div class="mf-label">Lim. S/Dobra</div><div class="mf-val ${limClass}">${c.limDobra}</div></div>
        <div class="mf"><div class="mf-label">Período</div><div class="mf-val">${c.periodo}</div></div>
      </div>
    </div>
    <div class="modal-footer">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${c.aprovada && c.aprovada !== '—' ? `<span class="badge b-concluido" style="font-size:9px">${c.aprovada}</span>` : ''}
        ${c.concluida && c.concluida !== '—' ? `<span class="badge b-concluido" style="font-size:9px">✓ ${c.concluida}</span>` : ''}
      </div>
      <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--accent-lt);color:var(--accent);padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase" for="mfph-${rowIndex}" onclick="event.stopPropagation()">
        ✎ Alterar Foto
      </label>
      <input type="file" id="mfph-${rowIndex}" accept="image/*" style="display:none"
        onchange="handlePhotoUpload(${rowIndex},event,document.getElementById('btnph-${rowIndex}'))">
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

/* ── BADGE ── */
function badgeHTML(status) {
  const map = {
    'CONCLUÍDA': ['b-concluido', '✓ Concluída'],
    'EM FÉRIAS': ['b-ferias',    '🏖 Em Férias'],
    'AGENDADO':  ['b-agendado',  'Agendado'],
    'A VENCER':  ['b-vencer',    '⚠ A Vencer'],
    'DESLIGADO': ['b-desligado', 'Desligado'],
    'ATIVO':     ['b-ativo',     '● Ativo'],
  };
  const [cls, label] = map[status] || ['b-undefined', status];
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}

/* ── TOAST ── */
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3500);
}
</script>
